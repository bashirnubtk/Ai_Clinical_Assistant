<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareNexus AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; }
        /* লিংকের নিচের দাগ সরানোর জন্য */
        a { text-decoration: none !important; }
        .nav-link:hover { color: #bfdbfe !important; }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="bg-blue-600 p-4 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="{% url 'home' %}" class="text-2xl font-bold flex items-center gap-2 tracking-tight text-white">
                <span class="text-3xl">🏥</span> CareNexus AI
            </a>

            <div class="flex items-center gap-8">
                <div class="hidden md:flex items-center gap-6">
                    <a href="{% url 'home' %}" class="nav-link text-white transition font-medium">হোম</a>
                    <a href="{% url 'ai_agent' %}" class="nav-link text-white transition font-medium">AI এজেন্ট</a>
                    <a href="{% url 'service_list' %}" class="nav-link text-white transition font-medium bg-white/10 px-3 py-1 rounded-lg">সার্ভিস ও বিলিং</a>
                </div>

                <div class="flex items-center gap-4 border-l border-white/20 pl-6">
                    {% if user.is_authenticated %}
                        <div class="flex items-center bg-white/20 px-4 py-2 rounded-full gap-2 border border-white/30">
                            <span class="text-white font-bold text-sm">
                                {% if user.is_superuser %} Hospital Admin {% else %} {{ user.username }} {% endif %}
                            </span>
                        </div>
                        <a href="{% url 'logout' %}" class="bg-red-500 hover:bg-red-600 text-white px-5 py-2 rounded-xl font-bold transition shadow-lg text-sm">লগআউট</a>
                    {% else %}
                        <a href="{% url 'login' %}" class="text-white font-bold px-4 py-2 rounded-xl hover:bg-white/10 transition">লগইন</a>
                        <a href="{% url 'register' %}" class="bg-white text-blue-600 px-6 py-2 rounded-xl font-bold shadow-md hover:bg-gray-100 transition transform active:scale-95">
                            সাইন-আপ
                        </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto mt-6 px-4">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
